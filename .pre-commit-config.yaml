# https://pre-commit.com
# Install hooks: `make pre-commit-install` or `uv run pre-commit install`
# Run checks:    `make lint` or `uv run pre-commit run --all-files`

default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        language: system
        entry: uv run pylint --rcfile=pyproject.toml
        files: ^(app|config|logging_config)\.py$|^(GUI|services|models)/.+\.py$

      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy --config-file=pyproject.toml
        args:
          - app.py
          - config.py
          - logging_config.py
          - GUI
          - services
          - models
        pass_filenames: false
        always_run: true
